<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>FIFA-Mobile Test Demo</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div id="game">
    <div id="field">
      <div id="ball"></div>
      <div id="player" tabindex="0"></div>
    </div>
    <div id="controls">
      <button id="left">◀</button>
      <button id="up">▲</button>
      <button id="down">▼</button>
      <button id="right">▶</button>
      <button id="kick">Kick</button>
    </div>
    <p id="info">Use arrow keys or buttons to move. Press Kick to shoot.</p>
  </div>
  <script src="script.js"></script>
</body>
</html>
